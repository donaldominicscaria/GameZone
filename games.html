<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->

  <header>
    <nav class="navbar">

      <h1 class="logo">🎮 GameZone</h1>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="games.html">Games</a></li>
      </ul>

    </nav>
  </header>

  <!-- Games Section -->

  <section class="products">

    <h2 class="section-title">Top PC Games</h2>

    <div class="product-container">

      <!-- GTA 5 -->

      <div class="product-card">
        <img src="images/gta.jpg" alt="GTA 5">

        <h3>GTA 5</h3>

        <p>₹1,499</p>

        <button onclick="buyGame('GTA 5')">
    Buy Now
</button>
        </button>
      </div>

      <!-- RDR2 -->

      <div class="product-card">
        <img src="images/rdr.jpg" alt="Red Dead Redemption 2">

        <h3>Red Dead Redemption 2</h3>

        <p>₹2,999</p>

        <button onclick="buyGame('RDR2')">
          Buy Now
        </button>
      </div>

      <!-- Cyberpunk -->

      <div class="product-card">
        <img src="images/cyber.jpg" alt="Cyberpunk 2077">

        <h3>Cyberpunk 2077</h3>

        <p>₹2,499</p>

        <button onclick="buyGame('Cyberpunk 2077')">
          Buy Now
        </button>
      </div>

      <!-- Minecraft -->

      <div class="product-card">
        <img src="images/mine.jpg" alt="Minecraft">

        <h3>Minecraft</h3>

        <p>₹3,499</p>

        <button onclick="buyGame('Minecraft')">
          Buy Now
        </button>
      </div>

    </div>

  <script src="script.js"></script>

</html>
